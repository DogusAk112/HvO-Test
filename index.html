<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>🚑 HvO Status</title>

  <!-- Supabase JS v2 (wichtig: window.supabase.createClient) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1"></script>

  <style>
    :root{
      --bg:#0b1220;
      --panel: rgba(15,23,42,.78);
      --panel2: rgba(30,41,59,.55);
      --border: rgba(148,163,184,.18);
      --text:#f1f5f9;
      --muted:#94a3b8;

      --ok:#22c55e;
      --bad:#ef4444;
      --info:#3b82f6;
      --warn:#f59e0b;

      --shadow: 0 16px 46px rgba(0,0,0,.35);
      --r16:16px;
      --r20:20px;

      --footer-h: 92px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background: radial-gradient(1200px 600px at 20% 0%, rgba(59,130,246,.16), transparent 55%),
                  radial-gradient(900px 500px at 90% 20%, rgba(34,197,94,.10), transparent 50%),
                  var(--bg);
      color:var(--text);
      padding:12px;
      padding-bottom: calc(var(--footer-h) + 12px + env(safe-area-inset-bottom, 0px));
    }
    .wrap{max-width:980px;margin:0 auto}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .spacer{flex:1}
    .muted{color:var(--muted);font-weight:650}
    h1{margin:0;font-size:20px;font-weight:950;letter-spacing:.2px}

    .card{
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: var(--r20);
      box-shadow: var(--shadow);
      padding: 12px;
      margin-bottom: 10px;
    }
    .hero{
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--r20);
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .pill{
      display:inline-flex;align-items:center;gap:8px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,.22);
      background: rgba(15,23,42,.55);
      font-size:12.5px;
      font-weight:900;
      white-space:nowrap;
    }
    .pill.ok{border-color: rgba(34,197,94,.35)}
    .pill.bad{border-color: rgba(239,68,68,.40)}
    .pill.info{border-color: rgba(59,130,246,.40)}
    .pill.warn{border-color: rgba(245,158,11,.40)}
    .pill.muted{color:var(--muted);font-weight:850}

    select,button{
      border-radius: 14px;
      border: 1px solid rgba(148,163,184,.20);
      background: rgba(15,23,42,.75);
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
    }
    button{cursor:pointer;font-weight:950}
    button:disabled{opacity:.55;cursor:not-allowed}
    .btn.primary{background: rgba(59,130,246,.95); border-color: rgba(59,130,246,.95)}
    .btn.green{background: rgba(34,197,94,.95); border-color: rgba(34,197,94,.95); color:#06240f}
    .btn.red{background: rgba(239,68,68,.95); border-color: rgba(239,68,68,.95)}
    .btn.ghost{background: rgba(15,23,42,.45)}

    .grid{
      display:grid;
      grid-template-columns: 1.1fr .9fr;
      gap:10px;
      margin-bottom: 10px;
    }
    @media(max-width:860px){ .grid{grid-template-columns:1fr} }

    .pickupBox{
      margin-top: 10px;
      padding: 12px;
      border-radius: var(--r16);
      border:1px solid rgba(34,197,94,.28);
      background: rgba(34,197,94,.08);
    }
    .pickupBox.none{
      border-color: rgba(245,158,11,.35);
      background: rgba(245,158,11,.09);
    }
    .pickupBox .label{font-weight:950;letter-spacing:.2px}
    .pickupBox .names{
      margin-top: 6px;
      font-size: 20px;
      line-height: 1.2;
      font-weight: 980;
      word-break: break-word;
    }

    .kv{display:flex;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px dashed rgba(148,163,184,.18)}
    .kv:last-child{border-bottom:none}
    .kv .k{color:var(--muted);font-weight:850}
    .kv .v{font-weight:950}

    .listHead{
      display:flex;align-items:center;gap:10px;flex-wrap:wrap;
      justify-content:space-between;
      margin-bottom: 8px;
    }
    .seg{
      display:inline-flex;
      border:1px solid rgba(148,163,184,.20);
      border-radius: 999px;
      overflow:hidden;
      background: rgba(15,23,42,.45);
    }
    .seg button{
      border:none;background:transparent;
      padding: 8px 12px;
      font-weight:950;
    }
    .seg button.active{background: rgba(59,130,246,.92)}

    .item{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      padding: 12px;
      border-radius: var(--r16);
      border:1px solid rgba(148,163,184,.14);
      background: rgba(15,23,42,.70);
      margin-top: 8px;
    }
    .left{display:flex;flex-direction:column;gap:6px}
    .name{font-weight:980;letter-spacing:.2px}
    .meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

    .toast{
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(var(--footer-h) + 12px + env(safe-area-inset-bottom, 0px));
      z-index: 50;
      display:none;
      padding: 10px 14px;
      border-radius: 999px;
      border:1px solid rgba(148,163,184,.25);
      background: rgba(15,23,42,.92);
      box-shadow: var(--shadow);
      font-weight: 950;
      max-width: calc(100% - 20px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .toast.ok{border-color: rgba(34,197,94,.45)}
    .toast.err{border-color: rgba(239,68,68,.55)}

    .footer{
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 40;
      border-top:1px solid rgba(148,163,184,.22);
      background: rgba(15,23,42,.90);
      box-shadow: 0 -16px 46px rgba(0,0,0,.35);
      padding: 10px 12px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      min-height: var(--footer-h);
      backdrop-filter: blur(8px);
    }
    .footer .row{gap:8px; width:100%; justify-content:space-between}
    .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;}

    .dangerBox{
      margin-top:10px;
      padding:10px 12px;
      border-radius: var(--r16);
      border:1px solid rgba(239,68,68,.35);
      background: rgba(239,68,68,.09);
    }
    .dangerBox .t{font-weight:950}
    .dangerBox .d{margin-top:6px;color:rgba(241,245,249,.9);font-size:13px}
  </style>
</head>

<body>
<div class="wrap">

  <!-- Header -->
  <div class="card">
    <div class="row" style="justify-content:space-between">
      <div class="row">
        <span class="pill info">HvO</span>
        <h1>HvO Status</h1>
      </div>

      <div class="row">
        <span class="pill muted">Ich bin:</span>
        <select id="meSelect"></select>
        <button id="clearMe" class="btn ghost">Zurücksetzen</button>
      </div>
    </div>

    <div class="row" style="margin-top:8px">
      <span class="pill muted" id="dbPill">DB: prüfe…</span>
      <span class="pill muted" id="hint">Wähle oben deinen Namen.</span>
      <div class="spacer"></div>
      <span class="pill muted" id="geoPill">📍 Geo: aus</span>
      <button id="geoBtn" class="btn ghost" disabled>📍 Standort</button>
    </div>

    <div id="dbErrorBox" class="dangerBox" style="display:none">
      <div class="t">❌ Datenbank-Fehler</div>
      <div class="d mono" id="dbErrorText">—</div>
    </div>

    <!--
      OPTIONAL (für Geo-Status):
      ALTER TABLE public.helpers ADD COLUMN IF NOT EXISTS location_status text;
      (ort | rand | ausserhalb)
    -->
  </div>

  <!-- Dashboard -->
  <div class="grid">

    <!-- Left -->
    <div class="hero">
      <div class="row">
        <span class="pill info">🚗 Fahrer</span>
        <span class="pill" id="driverPill">—</span>
        <div class="spacer"></div>
        <span class="pill muted" id="livePill">Live</span>
      </div>

      <div id="pickupBox" class="pickupBox">
        <div class="label">👤 ABZUHOLEN (verfügbar & ohne Fahrzeug)</div>
        <div class="names" id="pickupNames">—</div>
      </div>
    </div>

    <!-- Right -->
    <div class="hero">
      <div class="row" style="justify-content:space-between">
        <span class="pill">👤 Du</span>
        <span id="mePill" class="pill muted">—</span>
      </div>

      <div class="kv">
        <div class="k">Status</div>
        <div class="v" id="meStatus">—</div>
      </div>
      <div class="kv">
        <div class="k">Fahrzeug</div>
        <div class="v" id="meVehicle">—</div>
      </div>

      <div class="row" style="margin-top:10px">
        <button id="toggleAvail" class="btn green" disabled>Verfügbar</button>
        <button id="takeVehicle" class="btn primary" disabled>Fahrzeug übernehmen</button>
        <button id="dropVehicle" class="btn red" disabled>Fahrzeug abgeben</button>
      </div>

      <div class="muted" style="margin-top:10px">
        Regel: <b>Außerhalb</b> ⇒ automatisch <b>nicht verfügbar</b>.
      </div>
    </div>

  </div>

  <!-- List -->
  <div class="card">
    <div class="listHead">
      <div class="row">
        <span class="pill">Team</span>
        <span class="pill muted" id="countPill">—</span>
      </div>

      <div class="seg">
        <button id="fAll" class="active">Alle</button>
        <button id="fAvail">Verfügbar</button>
        <button id="fPickup">Abzuholen</button>
      </div>
    </div>

    <div id="list"></div>
  </div>

</div>

<div id="toast" class="toast"></div>

<!-- Footer -->
<div class="footer">
  <div class="row">
    <span class="pill muted" id="placeText">📍 Ort: —</span>
    <span class="pill muted">🗓 <span id="dateText">—</span></span>
    <span class="pill muted">🕒 <span id="timeText">—</span></span>
  </div>
  <span class="pill" id="weatherText">⛅ Wetter lädt…</span>
</div>

<script>
  /**********************
   * 0) CONFIG
   **********************/
  const supabaseUrl = "https://yesbojjwzobfmlggjgbx.supabase.co";
  const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inllc2Jvamp3em9iZm1sZ2dqZ2J4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3NjU3NjMsImV4cCI6MjA4NzM0MTc2M30.43MTXrmQe09fVA9sQXZuDqBZHSZ01Ts6J2SkuI4PBzw";

  // Safety checks for common mistakes
  if(!/^https?:\/\/.+/.test(supabaseUrl)){
    alert("Supabase URL ist ungültig. Muss mit https:// starten.");
  }

  // IMPORTANT: v2 client
  const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

  /**********************
   * 1) STORAGE
   **********************/
  const LS_ID="hvo_me_helper_id";
  const getMeId=()=>localStorage.getItem(LS_ID)||"";
  const setMeId=(v)=>v?localStorage.setItem(LS_ID,v):localStorage.removeItem(LS_ID);

  /**********************
   * 2) DOM
   **********************/
  const meSelect = document.getElementById("meSelect");
  const clearMe = document.getElementById("clearMe");
  const hint = document.getElementById("hint");

  const dbPill = document.getElementById("dbPill");
  const dbErrorBox = document.getElementById("dbErrorBox");
  const dbErrorText = document.getElementById("dbErrorText");

  const driverPill = document.getElementById("driverPill");
  const pickupBox = document.getElementById("pickupBox");
  const pickupNames = document.getElementById("pickupNames");

  const mePill = document.getElementById("mePill");
  const meStatus = document.getElementById("meStatus");
  const meVehicle = document.getElementById("meVehicle");

  const toggleAvail = document.getElementById("toggleAvail");
  const takeVehicle = document.getElementById("takeVehicle");
  const dropVehicle = document.getElementById("dropVehicle");

  const list = document.getElementById("list");
  const countPill = document.getElementById("countPill");

  const fAll = document.getElementById("fAll");
  const fAvail = document.getElementById("fAvail");
  const fPickup = document.getElementById("fPickup");

  const toast = document.getElementById("toast");
  const livePill = document.getElementById("livePill");

  const dateText = document.getElementById("dateText");
  const timeText = document.getElementById("timeText");
  const weatherText = document.getElementById("weatherText");
  const placeText = document.getElementById("placeText");

  const geoPill = document.getElementById("geoPill");
  const geoBtn = document.getElementById("geoBtn");

  /**********************
   * 3) STATE
   **********************/
  let current = [];
  let loading = false;
  let realtime = false;
  let filter = "all";
  let geoTimer = null;
  let wxTimer = null;

  /**********************
   * 4) UI HELPERS
   **********************/
  function showToast(msg,type="ok"){
    toast.textContent = msg;
    toast.className = "toast " + (type==="err" ? "err":"ok");
    toast.style.display="block";
    clearTimeout(showToast._t);
    showToast._t = setTimeout(()=>toast.style.display="none", 1800);
  }

  function setFilterUI(v){
    fAll.classList.toggle("active", v==="all");
    fAvail.classList.toggle("active", v==="avail");
    fPickup.classList.toggle("active", v==="pickup");
  }

  function setDbOk(text="DB: OK"){
    dbPill.textContent = text;
    dbPill.className = "pill ok";
    dbErrorBox.style.display="none";
  }
  function setDbBad(err){
    dbPill.textContent = "DB: Fehler";
    dbPill.className = "pill bad";
    dbErrorBox.style.display="block";
    dbErrorText.textContent = String(err?.message || err || "Unbekannter Fehler");
  }

  /**********************
   * 5) DB CALLS (robust errors)
   **********************/
  async function dbPing(){
    // simplest: try read a single row
    const { error } = await sb.from("helpers").select("id").limit(1);
    if(error) throw error;
  }

  async function fetchHelpers(){
    const { data, error } = await sb
      .from("helpers")
      .select("*")
      .order("name",{ascending:true});
    if(error) throw error;
    return data||[];
  }

  async function updateHelper(id, patch){
    const { error } = await sb
      .from("helpers")
      .update(patch)
      .eq("id", id);
    if(error) throw error;
  }

  async function setVehicleOwner(helperId){
    // 2-step: first clear current owner (WHERE required), then set new
    const { error: e1 } = await sb
      .from("helpers")
      .update({ has_vehicle: false })
      .eq("has_vehicle", true);
    if(e1) throw e1;

    const { error: e2 } = await sb
      .from("helpers")
      .update({ has_vehicle: true })
      .eq("id", helperId);
    if(e2) throw e2;
  }

  /**********************
   * 6) GEO: outside => not available
   **********************/
  const KB = { lat: 48.742, lon: 10.101 }; // fallback center (used for distance only)
  const GEO_THRESHOLDS_KM = { ort: 3, rand: 10 };

  function haversineKm(lat1, lon1, lat2, lon2){
    const R = 6371;
    const toRad = (x) => x * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a =
      Math.sin(dLat/2)**2 +
      Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
    return 2 * R * Math.asin(Math.sqrt(a));
  }
  function classifyLocation(distanceKm){
    if(distanceKm <= GEO_THRESHOLDS_KM.ort) return "ort";
    if(distanceKm <= GEO_THRESHOLDS_KM.rand) return "rand";
    return "ausserhalb";
  }
  function geoLabel(code){
    if(code === "ort") return "Ort";
    if(code === "rand") return "Rand";
    if(code === "ausserhalb") return "Außerhalb";
    return "—";
  }
  function geoPillState(text, kind="muted"){
    geoPill.textContent = text;
    geoPill.className = "pill " + kind;
  }
  function getGeo(){
    return new Promise((resolve, reject) => {
      if(!("geolocation" in navigator)){
        reject(new Error("Geolocation nicht verfügbar"));
        return;
      }
      navigator.geolocation.getCurrentPosition(resolve, reject, {
        enableHighAccuracy: false,
        timeout: 12000,
        maximumAge: 120000
      });
    });
  }

  /**********************
   * 7) WEATHER + PLACE (client-side, independent from DB)
   **********************/
  function wxLabel(code){
    const map={
      0:"Klar",1:"Überwiegend klar",2:"Teilweise bewölkt",3:"Bewölkt",
      45:"Nebel",48:"Reif-Nebel",
      51:"Niesel",53:"Niesel",55:"Niesel",
      61:"Regen",63:"Regen",65:"Regen",
      71:"Schnee",73:"Schnee",75:"Schnee",
      80:"Schauer",81:"Schauer",82:"Starker Schauer",
      95:"Gewitter",96:"Gewitter",99:"Gewitter"
    };
    return map[code] || "—";
  }
  function wxIcon(code){
    if(code===0) return "☀️";
    if([1,2].includes(code)) return "🌤️";
    if(code===3) return "☁️";
    if([45,48].includes(code)) return "🌫️";
    if([51,53,55,61,63,65,80,81,82].includes(code)) return "🌧️";
    if([71,73,75].includes(code)) return "🌨️";
    if([95,96,99].includes(code)) return "⛈️";
    return "⛅";
  }

  async function reversePlaceName(lat, lon){
    try{
      const url =
        `https://nominatim.openstreetmap.org/reverse` +
        `?format=jsonv2&lat=${lat}&lon=${lon}` +
        `&zoom=14&addressdetails=1&accept-language=de`;
      const res = await fetch(url, { headers: { "Accept":"application/json" }});
      if(!res.ok) return null;
      const js = await res.json();
      const a = js?.address || {};
      const city = a.city || a.town || a.village || a.municipality || a.county;
      const state = a.state;
      if(city && state) return `${city}, ${state}`;
      return city || js?.name || null;
    }catch{
      return null;
    }
  }

  async function loadWeatherForCoords(lat, lon){
    try{
      const url =
        `https://api.open-meteo.com/v1/forecast` +
        `?latitude=${lat}&longitude=${lon}` +
        `&current=temperature_2m,weather_code,wind_speed_10m` +
        `&wind_speed_unit=kmh` +
        `&timezone=Europe%2FBerlin`;

      const res = await fetch(url);
      if(!res.ok) throw new Error(`Wetter HTTP ${res.status}`);
      const wx = await res.json();
      const cw = wx?.current;
      if(!cw) throw new Error("Wetter: keine 'current' Daten");

      const code = Number(cw.weather_code);
      const temp = Math.round(cw.temperature_2m);
      const wind = Math.round(cw.wind_speed_10m);

      weatherText.textContent = `${wxIcon(code)} ${temp}°C · ${wxLabel(code)} · Wind ${wind} km/h`;

      const place = await reversePlaceName(lat, lon);
      placeText.textContent = place ? `📍 ${place}` : `📍 ${lat.toFixed(3)}, ${lon.toFixed(3)}`;
    }catch(e){
      console.error(e);
      weatherText.textContent = "⛅ Wetter nicht verfügbar";
      placeText.textContent = "📍 Ort: —";
    }
  }

  async function loadWeather(){
    weatherText.textContent = "⛅ Wetter lädt…";
    placeText.textContent = "📍 Ort: —";

    if("geolocation" in navigator){
      navigator.geolocation.getCurrentPosition(
        (pos) => loadWeatherForCoords(pos.coords.latitude, pos.coords.longitude),
        () => loadWeatherForCoords(KB.lat, KB.lon),
        { enableHighAccuracy:false, timeout: 8000, maximumAge: 300000 }
      );
    } else {
      loadWeatherForCoords(KB.lat, KB.lon);
    }
  }

  /**********************
   * 8) RENDER
   **********************/
  function renderMeSelect(){
    const meId = getMeId();
    meSelect.innerHTML =
      `<option value="">— auswählen —</option>` +
      current.map(h => `<option value="${h.id}" ${h.id===meId ? "selected":""}>${h.name}</option>`).join("");

    hint.textContent = meId ? "Änderungen sind nur bei deinem Namen aktiv." : "Wähle oben deinen Namen.";
    const enabled = !!meId;
    toggleAvail.disabled = !enabled;
    takeVehicle.disabled = !enabled;
    dropVehicle.disabled = !enabled;
    geoBtn.disabled = !enabled;

    meSelect.onchange = async () => {
      setMeId(meSelect.value || "");
      showToast(meSelect.value ? "Auswahl gespeichert ✅" : "Auswahl zurückgesetzt");
      if(getMeId()){
        geoPillState("📍 Geo: bereit", "muted");
        updateGeoForMe();
        startGeoAuto();
      }else{
        geoPillState("📍 Geo: aus", "muted");
        stopGeoAuto();
      }
      await load();
    };

    clearMe.onclick = async () => {
      setMeId("");
      meSelect.value = "";
      showToast("Auswahl zurückgesetzt");
      geoPillState("📍 Geo: aus", "muted");
      stopGeoAuto();
      await load();
    };

    geoBtn.onclick = updateGeoForMe;
  }

  function renderDashboard(){
    const driver = current.find(x => x.has_vehicle);
    driverPill.textContent = driver ? driver.name : "Keiner";

    if(!driver){
      pickupBox.classList.add("none");
      pickupNames.textContent = "⚠️ Kein Fahrer gesetzt – bitte Fahrzeug übernehmen.";
    } else {
      const pickup = current.filter(x => x.is_available && !x.has_vehicle);
      if(pickup.length){
        pickupBox.classList.remove("none");
        pickupNames.textContent = pickup.map(x => x.name).join(", ");
      } else {
        pickupBox.classList.add("none");
        pickupNames.textContent = "Niemand";
      }
    }

    const meId = getMeId();
    const me = current.find(x=>x.id===meId);

    if(!me){
      mePill.textContent = "—";
      mePill.className = "pill muted";
      meStatus.textContent = "—";
      meVehicle.textContent = "—";
      toggleAvail.textContent = "Verfügbar";
      toggleAvail.className = "btn green";
      takeVehicle.style.display = "inline-block";
      dropVehicle.style.display = "inline-block";
      return;
    }

    const outside = (me.location_status === "ausserhalb");
    const avail = !!me.is_available;

    mePill.textContent = `Du: ${me.name}`;
    mePill.className = "pill info";

    if(outside){
      meStatus.textContent = "🔴 Nicht verfügbar (Außerhalb)";
      toggleAvail.disabled = true;
      toggleAvail.textContent = "Außerhalb";
      toggleAvail.className = "btn red";
    } else {
      meStatus.textContent = avail ? "🟢 Verfügbar" : "🔴 Nicht verfügbar";
      toggleAvail.disabled = false;
      toggleAvail.textContent = avail ? "Nicht verfügbar" : "Verfügbar";
      toggleAvail.className = "btn " + (avail ? "red" : "green");
    }

    if(me.has_vehicle){
      meVehicle.textContent = "🚗 Du hast das Fahrzeug";
      takeVehicle.style.display = "none";
      dropVehicle.style.display = "inline-block";
    } else {
      meVehicle.textContent = "—";
      takeVehicle.style.display = "inline-block";
      dropVehicle.style.display = "none";
    }
  }

  function renderList(){
    let items = [...current];
    if(filter === "avail") items = items.filter(x => x.is_available);
    if(filter === "pickup") items = items.filter(x => x.is_available && !x.has_vehicle);

    items.sort((a,b)=>{
      if(a.has_vehicle !== b.has_vehicle) return a.has_vehicle ? -1 : 1;
      if(a.is_available !== b.is_available) return a.is_available ? -1 : 1;
      return (a.name||"").localeCompare(b.name||"");
    });

    countPill.textContent = `${items.length} angezeigt`;
    const meId = getMeId();

    list.innerHTML = "";
    for(const h of items){
      const el = document.createElement("div");
      el.className = "item";

      const left = document.createElement("div");
      left.className = "left";

      const nm = document.createElement("div");
      nm.className = "name";
      nm.textContent = h.name;

      const meta = document.createElement("div");
      meta.className = "meta";

      const s = document.createElement("span");
      s.className = "pill " + (h.is_available ? "ok" : "bad");
      s.textContent = h.is_available ? "🟢 Verfügbar" : "🔴 Nicht";
      meta.appendChild(s);

      if(h.has_vehicle){
        const v = document.createElement("span");
        v.className = "pill info";
        v.textContent = "🚗 Fahrzeug";
        meta.appendChild(v);
      }

      if(h.location_status){
        const kind = h.location_status === "ort" ? "ok" : (h.location_status === "rand" ? "warn" : "bad");
        const g = document.createElement("span");
        g.className = "pill " + kind;
        g.textContent = `📍 ${geoLabel(h.location_status)}`;
        meta.appendChild(g);
      }

      if(h.id === meId){
        const my = document.createElement("span");
        my.className = "pill muted";
        my.textContent = "Du";
        meta.appendChild(my);
      }

      left.appendChild(nm);
      left.appendChild(meta);

      el.appendChild(left);
      el.appendChild(document.createElement("div"));
      list.appendChild(el);
    }
  }

  /**********************
   * 9) LOAD + REALTIME
   **********************/
  async function load(){
    if(loading) return;
    loading = true;

    try{
      // DB ping each time first (helps identify "DB dead" vs UI bug)
      await dbPing();
      setDbOk("DB: OK");

      current = await fetchHelpers();

      renderMeSelect();
      renderDashboard();
      renderList();

      if(!realtime){
        realtime = true;
        sb.channel("helpers-live")
          .on("postgres_changes",{event:"*",schema:"public",table:"helpers"}, async () => {
            livePill.textContent = "Live · Update";
            clearTimeout(livePill._t);
            livePill._t = setTimeout(()=>livePill.textContent="Live", 800);
            await load();
          })
          .subscribe();
      }
    }catch(e){
      console.error("DB error:", e);
      setDbBad(e);

      // Still render UI with cached/current state if available
      renderMeSelect();
      renderDashboard();
      renderList();

      showToast(e?.message || String(e), "err");
    }finally{
      loading = false;
    }
  }

  /**********************
   * 10) ACTIONS
   **********************/
  toggleAvail.onclick = async () => {
    const meId = getMeId();
    if(!meId) return;

    const me = current.find(x=>x.id===meId);
    if(me?.location_status === "ausserhalb"){
      showToast("Außerhalb ⇒ bleibt nicht verfügbar", "err");
      return;
    }

    toggleAvail.disabled = true;
    try{
      const next = !me?.is_available;
      await updateHelper(meId, { is_available: next });
      showToast("Status gespeichert ✅");
      await load();
    }catch(e){
      console.error(e);
      showToast(e?.message || String(e), "err");
    }finally{
      toggleAvail.disabled = false;
    }
  };

  takeVehicle.onclick = async () => {
    const meId = getMeId();
    if(!meId) return;
    takeVehicle.disabled = true;
    try{
      await setVehicleOwner(meId);
      showToast("Fahrzeug übernommen ✅");
      await load();
    }catch(e){
      console.error(e);
      showToast(e?.message || String(e), "err");
    }finally{
      takeVehicle.disabled = false;
    }
  };

  dropVehicle.onclick = async () => {
    const meId = getMeId();
    if(!meId) return;
    dropVehicle.disabled = true;
    try{
      await updateHelper(meId, { has_vehicle: false });
      showToast("Fahrzeug abgegeben ✅");
      await load();
    }catch(e){
      console.error(e);
      showToast(e?.message || String(e), "err");
    }finally{
      dropVehicle.disabled = false;
    }
  };

  fAll.onclick = ()=>{ filter="all"; setFilterUI("all"); renderList(); };
  fAvail.onclick = ()=>{ filter="avail"; setFilterUI("avail"); renderList(); };
  fPickup.onclick = ()=>{ filter="pickup"; setFilterUI("pickup"); renderList(); };

  /**********************
   * 11) GEO UPDATE (writes to DB)
   **********************/
  async function updateGeoForMe(){
    const meId = getMeId();
    if(!meId) return;

    geoPillState("📍 Geo: wird ermittelt…", "muted");
    try{
      const pos = await getGeo();
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;

      // also update footer weather/place
      await loadWeatherForCoords(lat, lon);

      const km = haversineKm(lat, lon, KB.lat, KB.lon);
      const cat = classifyLocation(km);

      const kind = cat==="ort" ? "ok" : (cat==="rand" ? "warn" : "bad");
      geoPillState(`📍 ${geoLabel(cat)} (${Math.round(km)} km)`, kind);

      const patch = { location_status: cat };
      if(cat === "ausserhalb") patch.is_available = false;

      await updateHelper(meId, patch);

      if(cat === "ausserhalb") showToast("Außerhalb ⇒ automatisch nicht verfügbar", "ok");
      await load();
    }catch(e){
      console.error(e);
      if(e?.code === 1){
        geoPillState("📍 Geo: blockiert", "warn");
        showToast("Standort nicht erlaubt", "err");
      } else {
        geoPillState("📍 Geo: Fehler", "warn");
        showToast(e?.message || String(e), "err");
      }
    }
  }

  function startGeoAuto(){
    stopGeoAuto();
    geoTimer = setInterval(updateGeoForMe, 5 * 60 * 1000);
  }
  function stopGeoAuto(){
    if(geoTimer) clearInterval(geoTimer);
    geoTimer = null;
  }

  /**********************
   * 12) CLOCK
   **********************/
  function updateClock(){
    const now = new Date();
    dateText.textContent = new Intl.DateTimeFormat("de-DE",{
      timeZone:"Europe/Berlin", weekday:"short", year:"numeric", month:"2-digit", day:"2-digit"
    }).format(now);
    timeText.textContent = new Intl.DateTimeFormat("de-DE",{
      timeZone:"Europe/Berlin", hour:"2-digit", minute:"2-digit", second:"2-digit"
    }).format(now);
  }

  function startWeatherAuto(){
    if(wxTimer) clearInterval(wxTimer);
    wxTimer = setInterval(loadWeather, 15 * 60 * 1000);
  }

  /**********************
   * 13) BOOT
   **********************/
  setFilterUI("all");
  updateClock(); setInterval(updateClock, 1000);

  // initial weather (will use geo if allowed, else fallback)
  loadWeather();
  startWeatherAuto();

  geoPillState("📍 Geo: aus", "muted");

  // enable geo button only if user selected
  geoBtn.onclick = updateGeoForMe;

  // Initial load
  load().then(() => {
    if(getMeId()){
      geoPillState("📍 Geo: bereit", "muted");
      geoBtn.disabled = false;
      updateGeoForMe();
      startGeoAuto();
    }
  });
</script>
